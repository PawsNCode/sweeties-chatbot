name = "sweeties-chatbot"
main = "index.js"
compatibility_date = "2026-06-01"

# Transcript storage. Create the database in the Cloudflare dashboard
# (Storage & Databases > D1), then paste its Database ID below.
[[d1_databases]]
binding = "DB"
database_name = "sweeties-chatbot-transcripts"
database_id = "PASTE_YOUR_DATABASE_ID_HERE"
